<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NSE Setup Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d0f14; --card: #161b24; --border: #222c3c;
    --text: #e2e8f0; --muted: #64748b; --accent: #3b82f6;
    --green: #22c55e; --red: #ef4444; --yellow: #f59e0b;
    --purple: #a855f7; --teal: #14b8a6;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; }

  /* ── Header ── */
  header { background:var(--card); border-bottom:1px solid var(--border);
    padding:16px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
  header h1 { font-size:1.3rem; font-weight:700; display:flex; align-items:center; gap:8px; }
  header h1 span { color:var(--accent); }
  #last-updated { font-size:0.75rem; color:var(--muted); }

  /* ── Stats Bar ── */
  .stats-bar { display:flex; gap:12px; padding:16px 24px; flex-wrap:wrap; }
  .stat-card { background:var(--card); border:1px solid var(--border); border-radius:10px;
    padding:12px 20px; min-width:140px; flex:1; }
  .stat-card .label { font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
  .stat-card .value { font-size:1.5rem; font-weight:700; margin-top:2px; }

  /* ── Controls ── */
  .controls { padding:0 24px 16px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .setup-btn { padding:6px 14px; border-radius:20px; border:1px solid var(--border);
    background:transparent; color:var(--text); cursor:pointer; font-size:0.8rem;
    transition:all .2s; white-space:nowrap; }
  .setup-btn:hover, .setup-btn.active { border-color:var(--accent); background:rgba(59,130,246,.15); color:var(--accent); }
  .setup-btn[data-setup="Bull Flag"].active           { border-color:var(--green);  background:rgba(34,197,94,.12);  color:var(--green); }
  .setup-btn[data-setup="High Tight Flag"].active     { border-color:var(--yellow); background:rgba(245,158,11,.12); color:var(--yellow); }
  .setup-btn[data-setup="Power Earnings Gap"].active  { border-color:var(--purple); background:rgba(168,85,247,.12); color:var(--purple); }
  .setup-btn[data-setup="Flat Base Breakout"].active  { border-color:var(--teal);   background:rgba(20,184,166,.12); color:var(--teal); }

  .search-box { margin-left:auto; padding:6px 14px; border-radius:8px;
    border:1px solid var(--border); background:var(--card); color:var(--text);
    font-size:0.85rem; width:180px; outline:none; }
  .search-box:focus { border-color:var(--accent); }

  /* ── Sort Controls ── */
  .sort-controls { padding:0 24px 12px; display:flex; gap:8px; align-items:center; font-size:0.78rem; color:var(--muted); }
  .sort-btn { padding:4px 10px; border-radius:6px; border:1px solid var(--border);
    background:transparent; color:var(--muted); cursor:pointer; font-size:0.75rem; transition:all .2s; }
  .sort-btn.active, .sort-btn:hover { background:rgba(59,130,246,.1); border-color:var(--accent); color:var(--accent); }

  /* ── Grid ── */
  #grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:14px; padding:0 24px 40px; }

  /* ── Stock Card ── */
  .stock-card { background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:16px; cursor:pointer; transition:border-color .2s, transform .15s;
    display:flex; flex-direction:column; gap:10px; position:relative; overflow:hidden; }
  .stock-card:hover { border-color:var(--accent); transform:translateY(-2px); }
  .stock-card.bull-flag        { border-left:3px solid var(--green); }
  .stock-card.high-tight-flag  { border-left:3px solid var(--yellow); }
  .stock-card.power-earnings-gap { border-left:3px solid var(--purple); }
  .stock-card.flat-base-breakout { border-left:3px solid var(--teal); }

  .card-top { display:flex; justify-content:space-between; align-items:flex-start; }
  .card-sym { font-size:1rem; font-weight:700; }
  .card-price { font-size:1rem; font-weight:600; }
  .card-chg { font-size:0.8rem; padding:2px 7px; border-radius:4px; }
  .card-chg.pos { background:rgba(34,197,94,.15); color:var(--green); }
  .card-chg.neg { background:rgba(239,68,68,.15);  color:var(--red); }

  .setup-badge { display:inline-flex; align-items:center; gap:5px;
    font-size:0.72rem; padding:3px 9px; border-radius:12px; font-weight:600; }
  .badge-bf  { background:rgba(34,197,94,.15);  color:var(--green);  border:1px solid rgba(34,197,94,.3); }
  .badge-htf { background:rgba(245,158,11,.15); color:var(--yellow); border:1px solid rgba(245,158,11,.3); }
  .badge-peg { background:rgba(168,85,247,.15); color:var(--purple); border:1px solid rgba(168,85,247,.3); }
  .badge-fbb { background:rgba(20,184,166,.15); color:var(--teal);   border:1px solid rgba(20,184,166,.3); }
  .badge-none{ background:rgba(100,116,139,.1); color:var(--muted);  border:1px solid var(--border); }

  .score-bar-wrap { display:flex; align-items:center; gap:8px; }
  .score-label { font-size:0.7rem; color:var(--muted); width:30px; }
  .score-bar { flex:1; height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
  .score-fill { height:100%; border-radius:3px; transition:width .4s; }
  .score-val  { font-size:0.7rem; color:var(--muted); width:28px; text-align:right; }

  .card-meta { display:flex; gap:14px; font-size:0.72rem; color:var(--muted); }
  .meta-item span { color:var(--text); font-weight:500; }

  /* ── Mini Chart ── */
  .mini-chart-wrap { height:56px; position:relative; }
  .mini-chart-wrap canvas { width:100% !important; height:56px !important; }

  /* ── All Setups mini badges ── */
  .all-setups { display:flex; gap:5px; flex-wrap:wrap; }
  .mini-badge { font-size:0.65rem; padding:2px 6px; border-radius:8px; opacity:0.5; }
  .mini-badge.active { opacity:1; }

  /* ── Modal ── */
  #modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75);
    z-index:100; align-items:center; justify-content:center; }
  #modal-overlay.open { display:flex; }
  #modal { background:var(--card); border:1px solid var(--border); border-radius:16px;
    padding:28px; width:min(640px,95vw); max-height:88vh; overflow-y:auto; }
  #modal h2 { font-size:1.3rem; margin-bottom:4px; }
  #modal .modal-meta { font-size:0.8rem; color:var(--muted); margin-bottom:20px; }
  .modal-chart-wrap { height:180px; margin-bottom:20px; }
  .modal-setups { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .modal-setup-card { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:14px; }
  .modal-setup-card h4 { font-size:0.8rem; margin-bottom:8px; }
  .modal-setup-card .triggered { font-size:0.75rem; margin-bottom:6px; }
  .close-btn { float:right; background:transparent; border:1px solid var(--border);
    color:var(--text); border-radius:8px; padding:6px 14px; cursor:pointer; font-size:0.85rem; }
  .close-btn:hover { background:var(--border); }

  /* ── No results ── */
  #no-results { display:none; text-align:center; padding:60px 24px; color:var(--muted); }

  /* ── Loading ── */
  #loading { text-align:center; padding:60px; color:var(--muted); font-size:0.9rem; }
  .spinner { width:32px; height:32px; border:3px solid var(--border);
    border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite;
    margin:0 auto 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>📈 NSE <span>Setup Scanner</span></h1>
  <div id="last-updated">Loading…</div>
</header>

<div class="stats-bar" id="stats-bar">
  <div class="stat-card"><div class="label">Total Stocks</div><div class="value" id="stat-total">—</div></div>
  <div class="stat-card"><div class="label" style="color:var(--green)">🚩 Bull Flag</div><div class="value" id="stat-bf" style="color:var(--green)">—</div></div>
  <div class="stat-card"><div class="label" style="color:var(--yellow)">🔥 High Tight Flag</div><div class="value" id="stat-htf" style="color:var(--yellow)">—</div></div>
  <div class="stat-card"><div class="label" style="color:var(--purple)">⚡ Power Earnings Gap</div><div class="value" id="stat-peg" style="color:var(--purple)">—</div></div>
  <div class="stat-card"><div class="label" style="color:var(--teal)">📐 Flat Base Breakout</div><div class="value" id="stat-fbb" style="color:var(--teal)">—</div></div>
</div>

<div class="controls">
  <button class="setup-btn active" data-setup="All">All Stocks</button>
  <button class="setup-btn" data-setup="Bull Flag">🚩 Bull Flag</button>
  <button class="setup-btn" data-setup="High Tight Flag">🔥 High Tight Flag</button>
  <button class="setup-btn" data-setup="Power Earnings Gap">⚡ Power Earnings Gap</button>
  <button class="setup-btn" data-setup="Flat Base Breakout">📐 Flat Base Breakout</button>
  <input class="search-box" id="search" placeholder="Search symbol…" type="text"/>
</div>

<div class="sort-controls">
  Sort by:
  <button class="sort-btn active" data-sort="score">Score ↓</button>
  <button class="sort-btn" data-sort="chg_1d">1D Change</button>
  <button class="sort-btn" data-sort="chg_1m">1M Change</button>
  <button class="sort-btn" data-sort="chg_3m">3M Change</button>
  <button class="sort-btn" data-sort="rel_vol">Rel Volume</button>
  <button class="sort-btn" data-sort="price">Price</button>
</div>

<div id="loading"><div class="spinner"></div>Loading stocks_data.json…</div>
<div id="no-results">No stocks match the current filter.</div>
<div id="grid"></div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <button class="close-btn" onclick="closeModal()">✕ Close</button>
    <h2 id="modal-sym">—</h2>
    <div class="modal-meta" id="modal-meta">—</div>
    <div class="modal-chart-wrap"><canvas id="modal-chart"></canvas></div>
    <div class="modal-setups" id="modal-setups"></div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const SETUP_CONFIG = {
  "Bull Flag":          { color: "#22c55e", badgeClass: "badge-bf",  cardClass: "bull-flag",           icon: "🚩" },
  "High Tight Flag":    { color: "#f59e0b", badgeClass: "badge-htf", cardClass: "high-tight-flag",     icon: "🔥" },
  "Power Earnings Gap": { color: "#a855f7", badgeClass: "badge-peg", cardClass: "power-earnings-gap",  icon: "⚡" },
  "Flat Base Breakout": { color: "#14b8a6", badgeClass: "badge-fbb", cardClass: "flat-base-breakout",  icon: "📐" },
  "No Setup":           { color: "#64748b", badgeClass: "badge-none",cardClass: "",                    icon: "—"  },
};

let allData   = [];
let activeFilter = "All";
let activeSort   = "score";
let searchTerm   = "";
let miniCharts   = {};
let modalChart   = null;

// ── Load Data ────────────────────────────────────────────────────────────────
fetch("./stocks_data.json")
  .then(r => { if (!r.ok) throw new Error("stocks_data.json not found. Run screener.py first."); return r.json(); })
  .then(data => {
    allData = data;
    document.getElementById("loading").style.display = "none";
    updateStats();
    renderGrid();
    document.getElementById("last-updated").textContent = "Last updated: " + new Date().toLocaleString("en-IN");
  })
  .catch(err => {
    document.getElementById("loading").innerHTML =
      `<div style="color:#ef4444">⚠️ ${err.message}</div>
       <p style="margin-top:8px;font-size:0.8rem;color:#64748b">Place <b>stocks_data.json</b> in the same folder and refresh.</p>`;
  });

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById("stat-total").textContent = allData.length;
  document.getElementById("stat-bf").textContent  = allData.filter(s => s.setups["Bull Flag"].triggered).length;
  document.getElementById("stat-htf").textContent = allData.filter(s => s.setups["High Tight Flag"].triggered).length;
  document.getElementById("stat-peg").textContent = allData.filter(s => s.setups["Power Earnings Gap"].triggered).length;
  document.getElementById("stat-fbb").textContent = allData.filter(s => s.setups["Flat Base Breakout"].triggered).length;
}

// ── Filter & Sort ─────────────────────────────────────────────────────────────
function getFiltered() {
  let d = [...allData];
  if (activeFilter !== "All") d = d.filter(s => s.setups[activeFilter] && s.setups[activeFilter].triggered);
  if (searchTerm) d = d.filter(s => s.symbol.toUpperCase().includes(searchTerm.toUpperCase()));
  d.sort((a, b) => {
    if (activeSort === "score")  return b.primary_score - a.primary_score;
    if (activeSort === "chg_1d") return b.chg_1d - a.chg_1d;
    if (activeSort === "chg_1m") return b.chg_1m - a.chg_1m;
    if (activeSort === "chg_3m") return b.chg_3m - a.chg_3m;
    if (activeSort === "rel_vol")return b.rel_vol - a.rel_vol;
    if (activeSort === "price")  return b.price - a.price;
    return 0;
  });
  return d;
}

// ── Render Grid ───────────────────────────────────────────────────────────────
function renderGrid() {
  // Destroy old mini charts
  Object.values(miniCharts).forEach(c => c.destroy());
  miniCharts = {};

  const grid = document.getElementById("grid");
  const noRes = document.getElementById("no-results");
  const data = getFiltered();

  if (!data.length) { grid.innerHTML = ""; noRes.style.display = "block"; return; }
  noRes.style.display = "none";

  grid.innerHTML = data.map((s, i) => buildCard(s, i)).join("");

  // Draw mini sparklines after DOM update
  requestAnimationFrame(() => {
    data.forEach((s, i) => drawMiniChart(s, i));
  });
}

function buildCard(s, i) {
  const cfg    = SETUP_CONFIG[s.primary_setup] || SETUP_CONFIG["No Setup"];
  const chgCls = s.chg_1d >= 0 ? "pos" : "neg";
  const chgSign= s.chg_1d >= 0 ? "+" : "";
  const scoreColor = s.primary_score > 70 ? "#22c55e" : s.primary_score > 40 ? "#f59e0b" : "#64748b";
  const volColor   = s.rel_vol > 2 ? "#22c55e" : s.rel_vol > 1.3 ? "#f59e0b" : "#64748b";
  const allBadges = Object.entries(SETUP_CONFIG)
    .filter(([k]) => k !== "No Setup")
    .map(([k, v]) => {
      const on = s.setups[k] && s.setups[k].triggered;
      return `<span class="mini-badge ${v.badgeClass} ${on ? 'active' : ''}">${v.icon}${k.split(' ')[0]}</span>`;
    }).join("");

  return `
  <div class="stock-card ${cfg.cardClass}" onclick="openModal('${s.symbol}')" data-idx="${i}">
    <div class="card-top">
      <div>
        <div class="card-sym">${s.symbol}</div>
        <div class="all-setups" style="margin-top:5px">${allBadges}</div>
      </div>
      <div style="text-align:right">
        <div class="card-price">₹${s.price.toLocaleString("en-IN")}</div>
        <div class="card-chg ${chgCls}" style="margin-top:4px">${chgSign}${s.chg_1d}%</div>
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:8px">
      <span class="setup-badge ${cfg.badgeClass}">${cfg.icon} ${s.primary_setup}</span>
      <span style="font-size:0.7rem;color:${scoreColor};margin-left:auto">Score: ${s.primary_score}</span>
    </div>

    <div class="score-bar-wrap">
      <span class="score-label">Setup</span>
      <div class="score-bar"><div class="score-fill" style="width:${s.primary_score}%;background:${cfg.color}"></div></div>
      <span class="score-val">${s.primary_score}</span>
    </div>

    <div class="mini-chart-wrap">
      <canvas id="mini-${i}"></canvas>
    </div>

    <div class="card-meta">
      <div class="meta-item">1M <span style="color:${s.chg_1m>=0?'#22c55e':'#ef4444'}">${s.chg_1m>=0?'+':''}${s.chg_1m}%</span></div>
      <div class="meta-item">3M <span style="color:${s.chg_3m>=0?'#22c55e':'#ef4444'}">${s.chg_3m>=0?'+':''}${s.chg_3m}%</span></div>
      <div class="meta-item">RVol <span style="color:${volColor}">${s.rel_vol}x</span></div>
      <div class="meta-item">AvgVol <span>${fmtVol(s.avg_vol)}</span></div>
    </div>
  </div>`;
}

function drawMiniChart(s, i) {
  const canvas = document.getElementById(`mini-${i}`);
  if (!canvas) return;
  const prices = s.sparkline;
  const isUp = prices[prices.length-1] >= prices[0];
  const color = isUp ? "#22c55e" : "#ef4444";
  const labels = prices.map((_, j) => j);

  miniCharts[i] = new Chart(canvas, {
    type: "line",
    data: {
      labels,
      datasets: [{
        data: prices, borderColor: color, borderWidth: 1.5,
        pointRadius: 0, fill: true,
        backgroundColor: isUp ? "rgba(34,197,94,0.07)" : "rgba(239,68,68,0.07)",
        tension: 0.3
      }]
    },
    options: {
      responsive: false, animation: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: {
        x: { display: false }, y: { display: false }
      }
    }
  });
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(sym) {
  const s = allData.find(x => x.symbol === sym);
  if (!s) return;
  document.getElementById("modal-sym").textContent = sym + "  ₹" + s.price.toLocaleString("en-IN");
  document.getElementById("modal-meta").textContent =
    `1D: ${s.chg_1d>=0?'+':''}${s.chg_1d}%  |  1M: ${s.chg_1m>=0?'+':''}${s.chg_1m}%  |  3M: ${s.chg_3m>=0?'+':''}${s.chg_3m}%  |  RVol: ${s.rel_vol}x`;

  // Modal chart
  if (modalChart) { modalChart.destroy(); modalChart = null; }
  const ctx = document.getElementById("modal-chart").getContext("2d");
  const isUp = s.sparkline[s.sparkline.length-1] >= s.sparkline[0];
  const color = isUp ? "#22c55e" : "#ef4444";
  modalChart = new Chart(ctx, {
    type: "line",
    data: {
      labels: s.sparkline.map((_, i) => i),
      datasets: [{
        data: s.sparkline, borderColor: color, borderWidth: 2,
        pointRadius: 0, fill: true,
        backgroundColor: isUp ? "rgba(34,197,94,0.1)" : "rgba(239,68,68,0.1)",
        tension: 0.3
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        mode: "index", intersect: false,
        callbacks: { label: ctx => "₹" + ctx.raw.toLocaleString("en-IN") }
      }},
      scales: {
        x: { display: false },
        y: { grid: { color: "#222c3c" }, ticks: { color: "#64748b", font: { size: 10 },
          callback: v => "₹" + v.toLocaleString("en-IN") } }
      }
    }
  });

  // Setup cards
  const setupHTML = Object.entries(s.setups).map(([name, val]) => {
    const cfg = SETUP_CONFIG[name] || SETUP_CONFIG["No Setup"];
    const bars = buildSetupBars(name, s);
    return `
    <div class="modal-setup-card" style="border-color:${val.triggered ? cfg.color+'44' : '#222c3c'}">
      <h4 style="color:${val.triggered ? cfg.color : '#64748b'}">${cfg.icon} ${name}</h4>
      <div class="triggered" style="color:${val.triggered ? cfg.color : '#64748b'}">
        ${val.triggered ? '✅ Active' : '○ Not triggered'}  |  Score: ${val.score}
      </div>
      <div class="score-bar-wrap">
        <div class="score-bar" style="flex:1">
          <div class="score-fill" style="width:${val.score}%;background:${cfg.color}"></div>
        </div>
        <span class="score-val">${val.score}</span>
      </div>
      <div style="font-size:0.68rem;color:#64748b;margin-top:8px">${SETUP_DESC[name]||''}</div>
    </div>`;
  }).join("");
  document.getElementById("modal-setups").innerHTML = setupHTML;
  document.getElementById("modal-overlay").classList.add("open");
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
}
document.getElementById("modal-overlay").addEventListener("click", e => {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
});

const SETUP_DESC = {
  "Bull Flag":          "Strong pole >8% in 10 days, then tight consolidation <6% with volume contraction.",
  "High Tight Flag":    "Stock gains >90% in 8 weeks, then consolidates <25% for 3–5 weeks. Very rare & powerful.",
  "Power Earnings Gap": "Gap up >5% on earnings day with volume >2× average, price holds above gap.",
  "Flat Base Breakout": "Price consolidates in <15% range for 5+ weeks, then breaks above base on volume."
};

// ── Event Listeners ───────────────────────────────────────────────────────────
document.querySelectorAll(".setup-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".setup-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.setup;
    renderGrid();
  });
});

document.querySelectorAll(".sort-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeSort = btn.dataset.sort;
    renderGrid();
  });
});

document.getElementById("search").addEventListener("input", e => {
  searchTerm = e.target.value;
  renderGrid();
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtVol(v) {
  if (v >= 1e7) return (v/1e7).toFixed(1) + "Cr";
  if (v >= 1e5) return (v/1e5).toFixed(1) + "L";
  if (v >= 1e3) return (v/1e3).toFixed(0) + "K";
  return v;
}
</script>
</body>
</html>
