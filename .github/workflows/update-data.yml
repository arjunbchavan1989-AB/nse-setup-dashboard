name: Update NSE Dashboard Data

on:
  schedule:
    # Runs at 12:00 PM UTC = 5:30 PM IST, Mon–Sat
    - cron: '0 12 * * 1-6'
  workflow_dispatch:  # Also allows manual trigger from GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      # Step 4: Run the screener
      - name: Run screener
        run: python screener.py

      # Step 5: Commit and push the new stocks_data.json
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks_data.json
          git diff --staged --quiet || git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M IST')"
          git push
